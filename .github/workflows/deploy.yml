name: Deploy Self Host

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, linux]

    steps:
      - name: Pull latest code
        run: |
          cd /home/fadlan/w46space
          git pull origin main

      - name: Rebuild and restart containers
        run: |
          cd /home/fadlan/w46space
          docker compose -p office-rent up -d --build

      - name: Check containers
        run: |
          cd /home/fadlan/w46space
          docker compose -p office-rent ps

name: office-rent
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: office_rent_frontend
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_PORT:-80}:80"
    restart: always
    networks:
      - office_rent_network

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: office_rent_mobile
    ports:
      - "${MOBILE_BIND_HOST:-127.0.0.1}:${MOBILE_PORT:-8080}:80"
    restart: always
    networks:
      - office_rent_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: office_rent_backend
    volumes:
      - ./backend:/var/www/html
    ports:
      - "${BACKEND_BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-8000}:80"
    restart: always
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - office_rent_network
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: office_rent_db
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    ports:
      - "${MYSQL_BIND_HOST:-127.0.0.1}:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - office_rent_network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: office_rent_grafana
    restart: always
    ports:
      - "${GRAFANA_BIND_HOST:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_DEFAULT_THEME=${GRAFANA_DEFAULT_THEME}
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL}
      - GF_SERVER_ENFORCE_DOMAIN=${GRAFANA_ENFORCE_DOMAIN}
      - GF_SECURITY_COOKIE_SECURE=${GRAFANA_COOKIE_SECURE}
      - GF_METRICS_ENABLED=${GRAFANA_METRICS_ENABLED}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - mysql
      - prometheus
      - loki
    networks:
      - office_rent_network

  prometheus:
    image: prom/prometheus:latest
    container_name: office_rent_prometheus
    restart: always
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME}
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_BIND_HOST:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - docker-stats-exporter
    networks:
      - office_rent_network

  docker-stats-exporter:
    build:
      context: ./docker-stats-exporter
      dockerfile: Dockerfile
    container_name: office_rent_docker_stats_exporter
    restart: always
    ports:
      - "${DOCKER_STATS_EXPORTER_BIND_HOST:-127.0.0.1}:${DOCKER_STATS_EXPORTER_PORT:-9104}:9104"
    environment:
      - DOCKER_PROJECT_LABEL=${DOCKER_PROJECT_LABEL}
      - EXPORTER_PORT=9104
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - office_rent_network

  loki:
    image: grafana/loki:2.9.8
    container_name: office_rent_loki
    restart: always
    command: -config.file=/etc/loki/config.yml
    ports:
      - "${LOKI_BIND_HOST:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    networks:
      - office_rent_network

  promtail:
    image: grafana/promtail:2.9.8
    container_name: office_rent_promtail
    restart: always
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - ./backend/storage/logs:/var/log/laravel:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
    networks:
      - office_rent_network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: office_rent_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - frontend
      - backend
      - grafana
    networks:
      - office_rent_network

  mailhog:
    image: mailhog/mailhog
    container_name: office_rent_mailhog
    ports:
      - "${MAILHOG_BIND_HOST:-127.0.0.1}:${MAILHOG_SMTP_PORT:-1025}:1025" # SMTP port
      - "${MAILHOG_BIND_HOST:-127.0.0.1}:${MAILHOG_WEB_PORT:-8025}:8025" # Web UI port
    networks:
      - office_rent_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: office_rent_node_exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave

networks:
  office_rent_network:
    driver: bridge

volumes:
  mysql_data:
  grafana_data:
  prometheus_data:
  loki_data:
  promtail_positions:

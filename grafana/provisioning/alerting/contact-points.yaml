apiVersion: 1

contactPoints:
  # Contact point: Email notifikasi ke admin
  - orgId: 1
    name: Office Rent Admin Email
    receivers:
      - uid: office-rent-email
        type: email
        settings:
          addresses: admin@w46space.nexvol.xyz
          subject: "[Office Rent Alert] {{ .GroupLabels.alertname }}"
          message: |
            🚨 *Grafana Alert - Office Rent*

            Status : {{ .Status | toUpper }}
            Alert  : {{ .GroupLabels.alertname }}
            Service: {{ .CommonLabels.service }}
            Severity: {{ .CommonLabels.severity }}

            {{ range .Alerts }}
            Summary    : {{ .Annotations.summary }}
            Description: {{ .Annotations.description }}
            Fired at   : {{ .StartsAt.Format "2006-01-02 15:04:05" }}
            {{ end }}

            Buka Grafana: https://grafana.w46space.nexvol.xyz
        disableResolveMessage: false

  # Contact point: Webhook (opsional - bisa diisi URL Discord/Telegram)
  - orgId: 1
    name: Office Rent Webhook
    receivers:
      - uid: office-rent-webhook
        type: webhook
        settings:
          url: ""
          httpMethod: POST
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: Office Rent Admin Email
    group_by:
      - alertname
      - service
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: Office Rent Admin Email
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
      - receiver: Office Rent Admin Email
        matchers:
          - severity = warning
        group_wait: 30s
        repeat_interval: 4h

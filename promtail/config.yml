server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: laravel
    static_configs:
      - targets:
          - localhost
        labels:
          job: laravel
          app: office-rent
          service: backend
          __path__: /var/log/laravel/*.log
    pipeline_stages:
      - multiline:
          firstline: '^\[[0-9]{4}-[0-9]{2}-[0-9]{2}'
          max_wait_time: 3s
      - regex:
          expression: '^\[(?P<timestamp>[^\]]+)\] (?P<environment>[^.]+)\.(?P<level>[A-Z]+):'
      - labels:
          environment:
          level:
